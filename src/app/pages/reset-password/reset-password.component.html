<div class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-8" role="main">
    <!-- En-tête -->
    <div class="text-center mb-8">
      <h3 class="text-3xl font-bold text-gray-900 mb-2">
        Réinitialiser le mot de passe
      </h3>
      <p class="text-gray-600">
        Entrez vos informations pour réinitialiser votre mot de passe
      </p>
    </div>

    <div *ngIf="error.display">
      <div
        class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg max-w-md w-full flex items-center"
      >
        <!-- Error Icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 mr-2 text-red-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <!-- Error Text -->
        <div>
          <p class="text-sm">{{ error.message }}</p>
        </div>
      </div>
      <br />
    </div>

    <!-- Formulaire -->
    <form class="space-y-6" action="#" method="POST">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Adresse e-mail
        </label>
        <input
          [(ngModel)]="resetPasswordData.email"
          type="email"
          id="email"
          name="email"
          required
          placeholder="Entrez votre e-mail"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
        />
      </div>

      <!-- Code de vérification -->
      <div>
        <label for="code" class="block text-sm font-medium text-gray-700 mb-1">
          Code de vérification
        </label>
        <input
          [(ngModel)]="resetPasswordData.code"
          type="text"
          id="code"
          name="code"
          required
          placeholder="Entrez le code reçu"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
        />
      </div>

      <!-- Nouveau mot de passe -->
      <div>
        <label
          for="password"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Nouveau mot de passe
        </label>
        <input
          [(ngModel)]="resetPasswordData.newPassword"
          type="password"
          id="password"
          name="password"
          required
          placeholder="Créez un nouveau mot de passe"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
        />
      </div>

      <!-- Bouton de soumission -->
      <button
        (click)="onSubmit()"
        class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors duration-200 font-medium"
      >
        Réinitialiser le mot de passe
      </button>
    </form>

    <!-- Lien de retour -->
    <p class="mt-6 text-center text-sm text-gray-600">
      Retour à la connexion?
      <a
        routerLink="../login"
        class="text-blue-600 hover:text-blue-800 font-medium hover:underline"
      >
        Se connecter
      </a>
    </p>
  </div>
</div>

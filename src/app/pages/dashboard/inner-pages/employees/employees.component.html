<main class="flex-1 p-8">
  <!-- Header -->
  <div class="flex justify-between items-center mb-8">
    <h4 class="text-3xl font-bold text-gray-800">Gestion des Agents</h4>
    <div class="flex items-center space-x-4">
      <input
        type="text"
        [(ngModel)]="searchQuery"
        placeholder="Rechercher un agent..."
        class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <button (click)="addAgent()" 
        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
        Créer un Nouvel Agent
      </button>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Prenom</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Rôle</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Département</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <tr *ngFor="let agent of filteredAgents()" class="hover:bg-gray-50">
          <td class="px-6 py-4">{{ agent.nom }}</td>
          <td class="px-6 py-4">{{ agent.prenom }}</td>
          <td class="px-6 py-4">{{ agent.role }}</td>
          <td class="px-6 py-4">{{ agent.departement }}</td>
          <td class="px-6 py-4">
            <div class="flex space-x-4">
              <button (click)="editAgent(agent)" class="text-blue-500 hover:text-blue-700">

                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                </svg>
              </button>
              <button (click)="removeAgent(agent.matricule)" class="text-red-500 hover:text-red-700">
             
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

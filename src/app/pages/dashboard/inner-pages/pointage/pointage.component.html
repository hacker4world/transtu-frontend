<!-- Inside the content area div (after the header) -->
<div
  class="p-8 flex-1 min-h-[calc(100vh-4rem)] flex items-center justify-center"
>
  <!-- Wider Form Container -->
  <div class="bg-white rounded-xl shadow-sm p-8 w-full max-w-4xl">
    <!-- Increased to max-w-4xl -->
    <h2 class="text-xl font-semibold text-gray-900 mb-8 text-center">
      Pointage des heures des employés
    </h2>

    <!-- Wider Form -->
    <form class="space-y-6 mx-auto w-full max-w-2xl">
      <!-- Increased to max-w-2xl -->
      <!-- Employee ID -->
      <div>
        <label
          for="employee-id"
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          Matricule employé
        </label>
        <input
          type="number"
          id="employee-id"
          name="employee-id"
          min="1"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"
          required
        />
      </div>

      <!-- Attendance Status -->
      <div>
        <label
          for="attendance-status"
          class="block text-sm font-medium text-gray-700 mb-2"
        >
          Type pointage
        </label>
        <select
          id="attendance-status"
          name="attendance-status"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white text-base"
          required
        >
          <option value="presence">Presence</option>
          <option value="absence">Absence</option>
          <option value="late">Retard</option>
        </select>
      </div>

      <!-- Notes -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Start Date -->
        <div>
          <label
            for="start-date"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Date debut
          </label>
          <input
            type="datetime-local"
            id="start-date"
            name="start-date"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"
            required
          />
        </div>

        <!-- End Date -->
        <div>
          <label
            for="end-date"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Date fin
          </label>
          <input
            type="datetime-local"
            id="end-date"
            name="end-date"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"
            required
          />
        </div>
      </div>
      <!-- Submit Button -->
      <div class="flex justify-center">
        <button
          type="submit"
          class="bg-blue-600 text-white py-2 px-12 rounded-lg hover:bg-blue-700 transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 text-base font-medium"
        >
          Enregistrer
        </button>
      </div>
    </form>
  </div>
</div>

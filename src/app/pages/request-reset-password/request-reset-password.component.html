<div class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-8" role="main">
    <div class="text-center mb-8">
      <h3 class="text-3xl font-bold text-gray-900 mb-2">
        Recuperation du compte
      </h3>
      <p class="text-gray-600">
        Entrez votre addresse email associe a votre compte
      </p>
    </div>

    <div *ngIf="error.show">
      <div
        class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg max-w-md w-full flex items-center"
      >
        <!-- Error Icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 mr-2 text-red-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <!-- Error Text -->
        <div>
          <p class="text-sm">{{ error.message }}</p>
        </div>
      </div>
      <br />
    </div>

    <form class="space-y-6">
      <div>
        <input
          [(ngModel)]="email"
          type="email"
          id="email"
          name="email"
          required
          placeholder="Entrez votre email"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          aria-label="Enter your email address"
        />
      </div>

      <button
        (click)="onSubmit()"
        type="submit"
        class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors duration-200 font-medium"
      >
        Envoyer code de recuperation
      </button>
    </form>

    <div class="mt-6 text-center">
      <a routerLink="../login" class="text-sm text-blue-600 hover:text-blue-500"
        >Se connecter</a
      >
    </div>
  </div>
</div>
